<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW-checkbox</title>
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
    <form class="form">
        <fieldset class="form-group">
            <legend class="form-group-title">Ваши личные данные</legend>
            <label class="label">Ваше имя
                <input id="name" class="input" type="text" placeholder="Имя" name="name" required />
            </label>
            <label class="label" class="ages">Ваш возраст
                <input id="ages" class="input" type="number" placeholder="Возраст" name="ages" required />
            </label>
            <label class="label">Ваш номер
                <input id="phone number" class="input" type="tel" inputmode="tel" placeholder="Номер телефона"
                    name="phone number" required />
            </label>
            <label class="label">Ваша почта
                <input id="email" class="input" type="text" placeholder="Email" name="email" required />
            </label>
        </fieldset>
        <fieldset class="form-group">
            <label for="massege" class="label">Сообщение</label>
            <textarea id="massege" class="textarea" placeholder="Ваше сообщение" name="massege" required></textarea>
            <label class="label checkbox-label">
                <input type="checkbox" class="checkbox" name="checkbox" required />
                <span class="checkbox-text">Я принимаю правила</span>
            </label>
        </fieldset>
        <button class="button" type="submit">Отправить</button>
    </form>
</body>

</html>
